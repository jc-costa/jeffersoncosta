<!DOCTYPE html>

<head>

 </head>

<body>

<section id="geral">

<header id="bannerGeral">
 <h1>Aqui ficará localizado o Banner</h1>
 </header><!--fim header banner geral-->

 </nav><!--fim nav topo-->

 </footer><!--fim rodape-->
